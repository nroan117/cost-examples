name: Cost Regression Check
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  cost-enforce:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Checkout cost action
        uses: actions/checkout@v4
        with:
          repository: nroan117/cost
          ref: v0.3.0
          token: ${{ secrets.COST_REPO_TOKEN }}
          path: .cost-action

      - name: Run CostGuard (enforce-on-critical)
        uses: ./.cost-action/action
        with:
          org_api_key: ${{ secrets.COST_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enforcement_mode: enforce-on-critical
          exclude_paths: tests scripts
