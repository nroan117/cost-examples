name: Cost Regression Check

on:
  push:
  pull_request:

jobs:
  cost:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: nroan117/cost@v0.1.0
        with:
          org_api_key: ${{ secrets.COST_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enforcement_mode: enforce-on-critical
        env:
          COST_API_BASE: https://cost-api-706230423289.us-central1.run.app
