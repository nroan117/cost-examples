rules:
  - id: missing-output-caps-responses
    patterns:
      - pattern: $X.responses.create(...)
      - pattern-not: $X.responses.create(..., max_output_tokens=..., ...)
    message: >
      OpenAI Responses API call is missing max_output_tokens. Without this cap, models like o3
      may generate extremely long responses at high cost. Add max_output_tokens=<limit> to all
      responses.create() calls.
    severity: ERROR
    languages: [python]
    metadata:
      category: core_compute
      severity: high
      confidence: high
      enforcement: block
