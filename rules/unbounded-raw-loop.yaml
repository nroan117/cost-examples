rules:
  - id: unbounded-raw-loop
    patterns:
      - pattern: |
          while True:
              ...
              $CALL.create(...)
              ...
      - pattern-not: |
          while True:
              ...
              break
              ...
      - pattern-not: |
          while True:
              ...
              return ...
              ...
      - pattern-not: |
          while True:
              ...
              raise ...
              ...
    message: "Unbounded agent loop: while True with SDK .create() and no break/return/raise. This can cause runaway costs."
    severity: ERROR
    languages: [python]
    metadata:
      category: agentic_execution
      severity: critical
      confidence: medium
